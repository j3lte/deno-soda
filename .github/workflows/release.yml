name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z):"
        required: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version bump + create release tag
      id-token: write # OIDC for JSR + npm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing requires >= 11.5.1)
        run: npm install -g npm@latest

      - name: Set version in deno.json
        run: deno task set-version ${{ github.event.inputs.version }}

      - name: Verify package (publish dry-run)
        run: deno publish --dry-run --allow-dirty

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "deno.json already at ${{ github.event.inputs.version }}, nothing to commit"
          else
            git commit -am "chore: release ${{ github.event.inputs.version }}"
          fi
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create ${{ github.event.inputs.version }}
          --target ${{ github.ref_name }}
          --title ${{ github.event.inputs.version }}
          --generate-notes

      - name: Publish to JSR
        run: deno publish

      - name: Build NPM package
        run: deno task npm ${{ github.event.inputs.version }}

      # Trusted publishing (OIDC): no token, uses the job's id-token: write
      # permission. npm attaches provenance automatically.
      - name: Publish to NPM
        run: cd ./npm && npm publish --access public
